name: fintech

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fintech
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      FAISS_DIR: /app/storage/faiss
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      RESET_DB: ${RESET_DB:-0}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage

volumes:
  postgres_data:
  backend_storage:
